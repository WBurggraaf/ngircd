[Global]
Name = ngircd.rich.test
AdminEMail = admin@example.org
Listen = 127.0.0.1
Ports = 6667,6668
MotdPhrase = Rich coverage test
Info = Rich coverage test
Network = TestNet
WebircPassword = secret
CloakHost = no
CloakHostModeX = no
MorePrivacy = no
NoticeBeforeRegistration = no

[Limits]
ConnectRetry = 30
IdleTimeout = 60
MaxConnections = 128
MaxConnectionsIP = 8
MaxJoins = 4
MaxNickLength = 15
MaxPenaltyTime = 5
MaxListSize = 200
PingTimeout = 90
PongTimeout = 15

[Options]
AllowedChannelTypes = #&+
AllowRemoteOper = yes
ConnectIPv4 = yes
ConnectIPv6 = no
DefaultChannelModes = nt
DefaultUserModes = i
DNS = no
IncludeDir = .
OperCanUseMode = yes
RequireAuthPing = yes
ScrubCTCP = yes

[Operator]
Name = root
Password = secret

[Server]
Name = upstream.example.org
Host = 127.0.0.1
Port = 6669
MyPassword = localpass
PeerPassword = remotepass
Group = TestGroup
Nick = LinkNick

[Channel]
Name = #test
Modes = +nt
Topic = Coverage channel
Key = secretkey
MaxUsers = 50
Invite = no
Private = no
Secret = no
TopicProtect = yes
